services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: discipline
      POSTGRES_PASSWORD: discipline
      POSTGRES_DB: discipline
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "discipline"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescale:
    image: timescale/timescaledb:2.17.0-pg16
    environment:
      POSTGRES_USER: discipline
      POSTGRES_PASSWORD: discipline
      POSTGRES_DB: discipline_ts
    ports:
      - "5433:5432"
    volumes:
      - ts_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: s3,kms,sqs
      DEBUG: 0
    ports:
      - "4566:4566"
    volumes:
      - ls_data:/var/lib/localstack

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4318:4318"
    volumes:
      - ./infra/otel/config.yaml:/etc/otelcol/config.yaml:ro

volumes:
  pg_data:
  ts_data:
  redis_data:
  ls_data:
